# Example nginx reverse proxy for the ATO API (health endpoints only).
#
# Inactive template: install.sh copies this to ato-api.conf.example under
# /etc/nginx/conf.d/. Replace server_name and certificate paths, then rename or
# symlink to ato-api.conf before enabling the site.
#
# nginx is the intended external listener on port 443. The API binds loopback
# only (127.0.0.1:8000) via systemd; do not expose the API port directly.
#
# Only /health/live and /health/ready are proxied today. All other paths return
# 404 until additional API routes are implemented and documented.

server {
    listen 443 ssl http2;
    server_name ato-api.internal.example.com;

    # REQUIRED: replace with customer-managed certificate paths before enabling.
    ssl_certificate /etc/nginx/tls/ato-api.crt;
    ssl_certificate_key /etc/nginx/tls/ato-api.key;
    ssl_protocols TLSv1.2 TLSv1.3;
    ssl_prefer_server_ciphers off;

    add_header Strict-Transport-Security "max-age=31536000; includeSubDomains" always;
    add_header X-Content-Type-Options "nosniff" always;
    add_header X-Frame-Options "DENY" always;
    add_header Referrer-Policy "strict-origin-when-cross-origin" always;
    add_header Content-Security-Policy "default-src 'none'; frame-ancestors 'none'" always;

    access_log /var/log/nginx/ato-api.access.log;
    error_log /var/log/nginx/ato-api.error.log warn;

    location = /health/live {
        proxy_pass http://127.0.0.1:8000;
        proxy_http_version 1.1;
        proxy_set_header Host 127.0.0.1:8000;
        proxy_set_header X-Forwarded-Proto https;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_read_timeout 30s;
        proxy_send_timeout 30s;
    }

    location = /health/ready {
        proxy_pass http://127.0.0.1:8000;
        proxy_http_version 1.1;
        proxy_set_header Host 127.0.0.1:8000;
        proxy_set_header X-Forwarded-Proto https;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_read_timeout 30s;
        proxy_send_timeout 30s;
    }

    location / {
        return 404;
    }
}
