# Example nginx site for the ATO portal and API.
#
# Inactive template: install.sh copies this to ato-portal.conf.example under
# /etc/nginx/conf.d/. Replace server_name and certificate paths, then rename or
# symlink to ato-portal.conf before enabling the site.
#
# The portal static bundle is served from /opt/ato-analyzer/portal/dist.
# Versioned API routes and OIDC auth routes proxy to the loopback API service.
#
# Identity contract: strip client-supplied identity headers at this boundary.
# Portal sessions are established by the API; browsers must not self-assert identity.

server {
    listen 443 ssl http2;
    server_name ato-portal.internal.example.com;

    server_tokens off;

    # REQUIRED: replace with customer-managed certificate paths before enabling.
    ssl_certificate /etc/nginx/tls/ato-portal.crt;
    ssl_certificate_key /etc/nginx/tls/ato-portal.key;
    ssl_protocols TLSv1.2 TLSv1.3;
    ssl_prefer_server_ciphers off;
    ssl_session_timeout 1d;
    ssl_session_cache shared:ATO_PORTAL_SSL:10m;

    add_header Strict-Transport-Security "max-age=31536000; includeSubDomains" always;
    add_header X-Content-Type-Options "nosniff" always;
    add_header X-Frame-Options "DENY" always;
    add_header Referrer-Policy "strict-origin-when-cross-origin" always;
    add_header Content-Security-Policy "default-src 'self'; script-src 'self'; style-src 'self' 'unsafe-inline'; img-src 'self' data:; connect-src 'self'; frame-ancestors 'none'; base-uri 'self'; form-action 'self'" always;
    add_header Permissions-Policy "camera=(), microphone=(), geolocation=(), payment=()" always;
    add_header Cross-Origin-Opener-Policy "same-origin" always;
    add_header Cross-Origin-Resource-Policy "same-origin" always;

    access_log /var/log/nginx/ato-portal.access.log;
    error_log /var/log/nginx/ato-portal.error.log warn;

    root /opt/ato-analyzer/portal/dist;
    index index.html;

    client_max_body_size 100m;

    location = /health/live {
        proxy_pass http://127.0.0.1:8000;
        proxy_http_version 1.1;
        proxy_set_header Host 127.0.0.1:8000;
        proxy_set_header X-Forwarded-Proto https;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Remote-User "";
        proxy_set_header X-Forwarded-User "";
        proxy_set_header Remote-User "";
        proxy_set_header X-User "";
        proxy_set_header X-Auth-Request-User "";
        proxy_set_header X-Groups "";
        proxy_set_header X-Forwarded-Groups "";
        proxy_hide_header X-Remote-User;
        proxy_hide_header X-Forwarded-User;
        proxy_hide_header Remote-User;
        proxy_hide_header X-User;
        proxy_hide_header X-Auth-Request-User;
        proxy_hide_header X-Groups;
        proxy_hide_header X-Forwarded-Groups;
        proxy_read_timeout 30s;
        proxy_send_timeout 30s;
    }

    location = /health/ready {
        proxy_pass http://127.0.0.1:8000;
        proxy_http_version 1.1;
        proxy_set_header Host 127.0.0.1:8000;
        proxy_set_header X-Forwarded-Proto https;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Remote-User "";
        proxy_set_header X-Forwarded-User "";
        proxy_set_header Remote-User "";
        proxy_set_header X-User "";
        proxy_set_header X-Auth-Request-User "";
        proxy_set_header X-Groups "";
        proxy_set_header X-Forwarded-Groups "";
        proxy_hide_header X-Remote-User;
        proxy_hide_header X-Forwarded-User;
        proxy_hide_header Remote-User;
        proxy_hide_header X-User;
        proxy_hide_header X-Auth-Request-User;
        proxy_hide_header X-Groups;
        proxy_hide_header X-Forwarded-Groups;
        proxy_read_timeout 30s;
        proxy_send_timeout 30s;
    }

    location /api/ {
        proxy_pass http://127.0.0.1:8000;
        proxy_http_version 1.1;
        proxy_set_header Host 127.0.0.1:8000;
        proxy_set_header X-Forwarded-Proto https;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Remote-User "";
        proxy_set_header X-Forwarded-User "";
        proxy_set_header Remote-User "";
        proxy_set_header X-User "";
        proxy_set_header X-Auth-Request-User "";
        proxy_set_header X-Groups "";
        proxy_set_header X-Forwarded-Groups "";
        proxy_hide_header X-Remote-User;
        proxy_hide_header X-Forwarded-User;
        proxy_hide_header Remote-User;
        proxy_hide_header X-User;
        proxy_hide_header X-Auth-Request-User;
        proxy_hide_header X-Groups;
        proxy_hide_header X-Forwarded-Groups;
        add_header X-Download-Options "noopen" always;
        proxy_read_timeout 120s;
        proxy_send_timeout 120s;
    }

    location / {
        try_files $uri $uri/ /index.html;
    }
}
