name: Contracts

on:
  pull_request:
  push:

permissions:
  contents: read

concurrency:
  group: ${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: true

jobs:
  contracts:
    runs-on: ubuntu-latest
    timeout-minutes: 15
    steps:
      - name: Check out repository
        uses: actions/checkout@v7

      - name: Set up Python
        uses: actions/setup-python@v6
        with:
          python-version: "3.12"
          cache: pip
          cache-dependency-path: pyproject.toml

      - name: Install development dependencies
        run: python -m pip install -e ".[dev]"

      - name: Run Ruff
        run: ruff check .

      - name: Run contract tests
        run: python -m pytest tests/test_contracts.py

      - name: Run deployment, portal, and E2E contract tests
        run: python -m pytest tests/test_deployment_contract.py tests/test_portal_contract.py tests/test_e2e_contract.py

      - name: Run operator tests
        run: python -m pytest tests/ato_operator

      - name: Run non-integration tests
        run: python -m pytest -m "not integration"

  portal:
    runs-on: ubuntu-latest
    timeout-minutes: 15
    defaults:
      run:
        working-directory: portal
    steps:
      - name: Check out repository
        uses: actions/checkout@v7

      - name: Set up Node.js
        uses: actions/setup-node@v4
        with:
          node-version: "22"
          cache: npm
          cache-dependency-path: portal/package-lock.json

      - name: Install portal dependencies
        run: npm ci

      - name: Run portal unit tests
        run: npm test

      - name: Typecheck and build portal
        run: npm run build

  portal-playwright-mocked:
    runs-on: ubuntu-latest
    timeout-minutes: 15
    defaults:
      run:
        working-directory: portal
    env:
      CI: true
    steps:
      - name: Check out repository
        uses: actions/checkout@v7

      - name: Set up Node.js
        uses: actions/setup-node@v4
        with:
          node-version: "22"
          cache: npm
          cache-dependency-path: portal/package-lock.json

      - name: Install portal dependencies
        run: npm ci

      - name: Install Playwright Chromium
        run: npx playwright install chromium

      - name: Run mocked Playwright security regressions
        run: npx playwright test e2e/security/rendering-authz.spec.ts

  integration-postgres:
    runs-on: ubuntu-latest
    timeout-minutes: 20
    services:
      postgres:
        image: postgres:16
        env:
          POSTGRES_USER: ato
          POSTGRES_PASSWORD: ato
          POSTGRES_DB: ato_test
        ports:
          - 5432:5432
        options: >-
          --health-cmd "pg_isready -U ato -d ato_test"
          --health-interval 5s
          --health-timeout 5s
          --health-retries 10
    env:
      ATO_TEST_DATABASE_URL: postgresql+asyncpg://ato:ato@localhost:5432/ato_test
      ATO_DATABASE_DSN_FILE: /tmp/ato-test-database.dsn
    steps:
      - name: Check out repository
        uses: actions/checkout@v7

      - name: Set up Python
        uses: actions/setup-python@v6
        with:
          python-version: "3.12"
          cache: pip
          cache-dependency-path: pyproject.toml

      - name: Install development dependencies
        run: python -m pip install -e ".[dev]"

      - name: Write migration DSN file
        run: printf '%s\n' 'postgresql+asyncpg://ato:ato@localhost:5432/ato_test' > /tmp/ato-test-database.dsn

      - name: Apply database migrations
        run: python -m alembic upgrade head

      - name: Run PostgreSQL integration tests
        run: python -m pytest tests/ato_service/test_workflow_e2e_integration.py tests/ato_service/test_workflow_recovery_integration.py -m integration
